services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      MONGODB_URI: mongodb://mongo:27017/monitoramento
      MONGODB_DATABASE: monitoramento
      CORS_ORIGINS: http://localhost:3000
      COLLECTOR_ENABLED: "true"
    depends_on:
      - mongo

volumes:
  mongo_data:
